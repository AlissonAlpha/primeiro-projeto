version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: ai-agency-backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
    depends_on:
      - redis
    networks:
      - ai-agency-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    container_name: ai-agency-frontend
    ports:
      - "3000:3000"
    env_file:
      - ../frontend/.env.local
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - ai-agency-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-agency-redis
    ports:
      - "6379:6379"
    networks:
      - ai-agency-network
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: ai-agency-worker
    command: celery -A backend.workers.celery_app worker --loglevel=info
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
    depends_on:
      - redis
      - backend
    networks:
      - ai-agency-network
    restart: unless-stopped

networks:
  ai-agency-network:
    driver: bridge
